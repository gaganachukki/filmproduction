<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmStudio - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">
    <div class="login-card">
        <a href="index.html" class="back-link">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Home
        </a>
        
        <h2>Welcome Back</h2>
        <p>Sign in to access your account</p>

        <div class="role-selector">
            <div class="role-btn active" onclick="selectRole(this, 'userdashboard.html')">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                Creators
            </div>
            <div class="role-btn" onclick="selectRole(this, 'admindashboard.html')">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                Studio Admin
            </div>
        </div>

        <form id="loginForm" action="userdashboard.html" method="GET">
            <div class="form-group">
                <input type="email" class="form-control" name="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" class="form-control" id="password" placeholder="Password" required>
                <button type="button" class="password-toggle" onclick="togglePassword()">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
            </div>
            <div class="form-actions">
                <label class="remember-me">
                    <input type="checkbox"> Remember Me
                </label>
                <a href="404.html" class="forgot-pw">Forgot Password?</a>
            </div>
            <button type="submit" class="btn-submit">Login</button>
            
            <div class="bottom-text">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
        </form>
    </div>

    <script>
        function selectRole(element, actionUrl) {
            // Remove active class from all buttons
            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
            // Add active class to clicked button
            element.classList.add('active');
            // Change form action to redirect correctly based on role
            document.getElementById('loginForm').action = actionUrl;
        }

        function togglePassword() {
            const pwd = document.getElementById('password');
            if (pwd.type === 'password') {
                pwd.type = 'text';
            } else {
                pwd.type = 'password';
            }
        }
    </script>

    <script src="js/main.js"></script>
</body>
</html>
